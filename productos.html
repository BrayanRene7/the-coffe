<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuestros Productos | The Coffe SPOT!</title>
  <link rel="stylesheet" href="/CSS/productos.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <section id="productos" class="productos-section">
    <div class="container text-center">
      <h2 class="titulo-productos">Nuestros Productos</h2>
      <hr class="linea-final">

      <div class="row productos-grid">
        <div class="col-md-4">
          <div class="producto card shadow-sm">
            <img src="/IMG/3.png" class="card-img-top" alt="Café Espresso">
            <div class="card-body">
              <h4 class="card-title">Café Espresso</h4>
              <p class="card-text">Intenso y aromático</p>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="producto card shadow-sm">
            <img src="/IMG/4.png" class="card-img-top" alt="Cappuccino">
            <div class="card-body">
              <h4 class="card-title">Cappuccino</h4>
              <p class="card-text">Con espuma cremosa</p>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="producto card shadow-sm">
            <img src="/IMG/5.png" class="card-img-top" alt="Latte">
            <div class="card-body">
              <h4 class="card-title">Latte</h4>
              <p class="card-text">Suave y delicioso</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
